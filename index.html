<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Model 3D</title>

  <!-- Ładowanie komponentu model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f0f0f0;
    }
    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <model-viewer
    src="otimo_design_belka_zelbetowa_zbrojenie.glb"
    camera-controls
    auto-rotate
    ar
    exposure="1.0">
  </model-viewer>
</body>
</html>
