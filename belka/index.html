<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>OTIMO – Modele 3D</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { margin: 0; font-family: Arial; background: #f5f5f5; }
    model-viewer { width: 100vw; height: 80vh; background: #fff; }

    .models, .panel {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #eee;
      border-top: 1px solid #ccc;
    }

    button {
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #999;
      background: #fff;
      border-radius: 4px;
    }
    button:hover { background: #ddd; }

    /* KOSTKA WIDOKU */
    .viewcube {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 80px;
      height: 80px;
      perspective: 300px;
      cursor: pointer;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(-20deg) rotateY(30deg);
      transition: transform 0.4s ease;
    }

    .face {
      position: absolute;
      width: 80px;
      height: 80px;
      background: #4a90e2;
      border: 2px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: white;
      opacity: 0.9;
    }

    .front  { transform: translateZ(40px); }
    .back   { transform: rotateY(180deg) translateZ(40px); }
    .right  { transform: rotateY(90deg) translateZ(40px); }
    .left   { transform: rotateY(-90deg) translateZ(40px); }
    .top    { transform: rotateX(90deg) translateZ(40px); }
    .bottom { transform: rotateX(-90deg) translateZ(40px); }
  </style>
</head>

<body>

<model-viewer id="viewer"
  src="model_bez_betonu.glb"
  camera-controls
  auto-rotate
  exposure="1.0">
</model-viewer>

<!-- KOSTKA WIDOKU -->
<div class="viewcube">
  <div class="cube" id="cube">
    <div class="face front"  onclick="viewFront()">F</div>
    <div class="face back"   onclick="viewBack()">B</div>
    <div class="face right"  onclick="viewRight()">R</div>
    <div class="face left"   onclick="viewLeft()">L</div>
    <div class="face top"    onclick="viewTop()">T</div>
    <div class="face bottom" onclick="viewBottom()">D</div>
  </div>
</div>

<!-- PRZEŁĄCZANIE MODELI -->
<div class="models">
  <button onclick="setModel('model_bez_betonu.glb')">Bez betonu</button>
  <button onclick="setModel('model_beton.glb')">Z betonem</button>
  <button onclick="setModel('model_zbrojenie.glb')">Samo zbrojenie</button>
</div>

<!-- PANEL WIDOKÓW -->
<div class="panel">
  <button onclick="zoomAll()">Zoom całość</button>
  <button onclick="viewIso()">Izo</button>
  <button onclick="viewTop()">Góra</button>
  <button onclick="viewSide()">Bok</button>
  <button onclick="viewFront()">Przód</button>
</div>

<script>
  const viewer = document.getElementById('viewer');

  /* ZMIANA MODELU */
  function setModel(file) {
    viewer.src = file;
  }

  /* PODSTAWOWE WIDOKI */
  function zoomAll() {
    viewer.cameraOrbit = "0deg 75deg auto";
    viewer.cameraTarget = "0m 0m 0m";
  }

  function viewIso() {
    viewer.cameraOrbit = "45deg 45deg auto";
  }

  function viewTop() {
    viewer.cameraOrbit = "0deg 90deg auto";
  }

  function viewSide() {
    viewer.cameraOrbit = "90deg 0deg auto";
  }

  function viewFront() {
    viewer.cameraOrbit = "0deg 0deg auto";
  }

  /* DODATKOWE WIDOKI Z KOSTKI */
  function viewBack() {
    viewer.cameraOrbit = "180deg 0deg auto";
  }

  function viewRight() {
    viewer.cameraOrbit = "90deg 0deg auto";
  }

  function viewLeft() {
    viewer.cameraOrbit = "-90deg 0deg auto";
  }

  function viewBottom() {
    viewer.cameraOrbit = "0deg -90deg auto";
  }
</script>

</body>
</html>
