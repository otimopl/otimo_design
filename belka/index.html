<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>OTIMO – Model 3D</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { margin: 0; font-family: Arial; background: #f5f5f5; }
    model-viewer { width: 100vw; height: 90vh; background: #fff; }

    .models {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #eee;
      border-top: 1px solid #ccc;
    }

    button {
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #999;
      background: #fff;
      border-radius: 4px;
    }

    button:hover { background: #ddd; }
  </style>
</head>

<body>

<model-viewer id="viewer"
  src="model_bez_betonu.glb"
  camera-controls
  exposure="1.0">
</model-viewer>

<div class="models">
  <button onclick="setModel('model_bez_betonu.glb')">Beton przezroczysty</button>
  <button onclick="setModel('model_beton.glb')">Model szalunkowy</button>
  <button onclick="setModel('model_zbrojenie.glb')">Samo zbrojenie</button>
</div>

<script>
  const viewer = document.getElementById('viewer');

  function setModel(file) {
    viewer.src = file;
  }
</script>

</body>
</html>
