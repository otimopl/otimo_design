<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>IFC Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
    }

    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: #222;
      display: flex;
      align-items: center;
      padding: 0 12px;
      z-index: 10;
      box-shadow: 0 2px 4px rgba(0,0,0,.6);
    }

    #topbar span {
      margin-right: 12px;
      font-size: 14px;
      opacity: 0.9;
    }

    #viewer-container {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <span><strong>IFC Viewer</strong></span>
    <span>Wybierz plik IFC:</span>
    <input id="file-input" type="file" accept=".ifc" />
  </div>

  <div id="viewer-container"></div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { IFCLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/IFCLoader.js";

    // --- Loader IFC ---
    const ifcLoader = new IFCLoader();
    ifcLoader.ifcManager.setWasmPath("https://cdn.jsdelivr.net/npm/web-ifc@0.0.46/");

    // --- Scena ---
    const container = document.getElementById("viewer-container");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    // --- Kamera ---
    const camera = new THREE.PerspectiveCamera(
      60,
      container.clientWidth / container.clientHeight,
      0.1,
      2000
    );
    camera.position.set(15, 10, 15);

    // --- Renderer ---
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // --- Światła ---
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.0));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // --- Grid ---
    scene.add(new THREE.GridHelper(50, 50, 0x444444, 0x222222));

    // --- Kontroler kamery ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    let currentModel = null;

    // --- Wczytywanie pliku IFC ---
    document.getElementById("file-input").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      if (currentModel) {
        scene.remove(currentModel);
      }

      const url = URL.createObjectURL(file);

      ifcLoader.load(
        url,
        (ifcModel) => {
          currentModel = ifcModel;
          scene.add(ifcModel);

          // Auto-centrowanie kamery
          const box = new THREE.Box3().setFromObject(ifcModel);
          const size = box.getSize(new THREE.Vector3()).length();
          const center = box.getCenter(new THREE.Vector3());

          controls.target.copy(center);
          controls.update();

          camera.position.copy(center.clone().add(new THREE.Vector3(1, 1, 1).normalize().multiplyScalar(size)));
          camera.near = size / 100;
          camera.far = size * 10;
          camera.updateProjectionMatrix();
        },
        (xhr) => {
          if (xhr.total) {
            console.log(`Wczytywanie IFC: ${(xhr.loaded / xhr.total * 100).toFixed(1)}%`);
          }
        },
        (error) => {
          console.error("Błąd IFC:", error);
          alert("Nie udało się wczytać pliku IFC.");
        }
      );
    });

    // --- Responsywność ---
    window.addEventListener("resize", () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // --- Render ---
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
